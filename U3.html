    <script>
        /* ==================================================
           1. 全域狀態變數（State）
           ================================================== */

        // 紀錄玩家目前選取了哪一張貼紙的 ID，尚未選取時為 null
        let selectedSticker = null;

        // 紀錄起點空位目前放置了哪一張貼紙的 ID，尚未放置時為 null
        let startSlotSticker = null;

        // 紀錄終點空位目前放置了哪一張貼紙的 ID，尚未放置時為 null
        let endSlotSticker = null;

        // 紀錄玩家目前的分數，初始分數為 100
        let score = 100;

        // 紀錄遊戲經過的時間，初始值為 0
        let time = 0;

        // 紀錄目前的遊戲狀態，初始狀態為進行中
        let gameState = 'playing';


        /* ==================================================
           2. 應用程式初始化（Init）
           ================================================== */

        /**
         * 初始化遊戲。
         * 網頁載入完成後，自動將所有全域狀態印到控制台。
         */
        function init() {
            console.table([
                {
                    狀態變數: 'selectedSticker',
                    初始值: selectedSticker
                },
                {
                    狀態變數: 'startSlotSticker',
                    初始值: startSlotSticker
                },
                {
                    狀態變數: 'endSlotSticker',
                    初始值: endSlotSticker
                },
                {
                    狀態變數: 'score',
                    初始值: score
                },
                {
                    狀態變數: 'time',
                    初始值: time
                },
                {
                    狀態變數: 'gameState',
                    初始值: gameState
                }
            ]);
        }

        // 當網頁的 HTML 結構載入完成後，自動執行初始化函式
        document.addEventListener('DOMContentLoaded', init);


        /* ==================================================
           3. DOM 元素取得
           ================================================== */

           4. 遊戲功能函式
           ================================================== */


        /* ==================================================
           5. 事件監聽器
           ================================================== */


        /* ==================================================
           6. 其他輔助功能
           ================================================== */

    </script>
</body>
